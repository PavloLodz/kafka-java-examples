spring:
  application:
    name: kafka-outbox-producer
  datasource:
    url: jdbc:postgresql://localhost:5432/outbox
    username: outbox
    password: outbox
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        transactional.id: outbox-tx-
        max.in.flight.requests.per.connection: 5

logging:
  level:
    pl.ldz.kafka: DEBUG
    org.springframework.kafka: INFO
