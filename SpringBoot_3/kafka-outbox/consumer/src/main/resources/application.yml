spring:
  application:
    name: kafka-outbox-consumer
  datasource:
    url: jdbc:postgresql://localhost:5432/outbox
    username: outbox
    password: outbox
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: outbox-consumer-group
      auto-offset-reset: earliest
      properties:
        isolation.level: read_committed

logging:
  level:
    pl.ldz.kafka: DEBUG
    org.springframework.kafka: INFO
